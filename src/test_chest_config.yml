index:
  maintain_only_tag_and_object_table: true
  database:
    log:
      path: /tmp/trove/test/TEST_NAME/log.dat
      checkpoint_on_size: 8 GB
    schemas:
      main_bucket:
        tag_and_object:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/tag_and_object/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/tag_and_object/data.dat
              container_size: 32
        object_and_tag:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/object_and_tag/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/object_and_tag/data.dat
              container_size: 32
        object:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/object/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/main_bucket/object/data.dat
              container_size: 16
      another_bucket:
        tag_and_object:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/tag_and_object/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/tag_and_object/data.dat
              container_size: 32
        object_and_tag:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/object_and_tag/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/object_and_tag/data.dat
              container_size: 32
        object:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/object/index.idx
          data_pool:
            fixed:
              path: /tmp/trove/test/TEST_NAME/schemas/another_bucket/object/data.dat
              container_size: 16
      data:
        main_bucket_document_id_and_path_to_value:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/data/main_bucket_document_id_and_path_to_value/index.idx
          data_pool:
            variable:
              directory: /tmp/trove/test/TEST_NAME/schemas/data/main_bucket_document_id_and_path_to_value/data
              max_element_size: 65536
        another_bucket_document_id_and_path_to_value:
          index:
            path: /tmp/trove/test/TEST_NAME/schemas/data/another_bucket_document_id_and_path_to_value/index.idx
          data_pool:
            variable:
              directory: /tmp/trove/test/TEST_NAME/schemas/data/another_bucket_document_id_and_path_to_value/data
              max_element_size: 65536
